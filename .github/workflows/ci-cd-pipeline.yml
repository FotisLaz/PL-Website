name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY_BACKEND: pl-backend-api
  ECR_REPOSITORY_PROCESSOR: pl-data-processor
  ECR_REPOSITORY_FRONTEND: pl-frontend
  ECR_REPOSITORY_SCRAPER: pl-scraper

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:15-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pl_connect_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Backend Tests
        run: |
          cd Backend
          # Αναμονή για το Postgres
          echo "Waiting for postgres..."
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && break || sleep 1
          done
          # Τρέξιμο των tests με overrides για τη βάση
          mvn -Dspring.datasource.url=jdbc:postgresql://localhost:5432/pl_connect_test \
              -Dspring.datasource.username=postgres \
              -Dspring.datasource.password=postgres \
              -Dspring.profiles.active=test clean test

      - name: Run Data Processor Tests
        run: |
          cd Backend/data-processor-service
          mvn clean test

      - name: Install Frontend Dependencies
        run: |
          cd Frontend
          npm ci

      - name: Run Frontend Tests
        run: |
          cd Frontend
          npm test -- --coverage --watchAll=false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            Backend/target/surefire-reports/
            Backend/data-processor-service/target/surefire-reports/
            Frontend/coverage/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    name: Build and Push Docker Images
    # ... (το υπόλοιπο κομμάτι για Docker/AWS μένει ίδιο) ...
