name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY_BACKEND: pl-backend-api
  ECR_REPOSITORY_PROCESSOR: pl-data-processor
  ECR_REPOSITORY_FRONTEND: pl-frontend
  ECR_REPOSITORY_SCRAPER: pl-scraper

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Backend Tests
        run: |
          cd Backend
          mvn clean test

      - name: Run Data Processor Tests
        run: |
          cd Backend/data-processor-service
          mvn clean test

      - name: Install Frontend Dependencies
        run: |
          cd Frontend
          npm ci

      - name: Run Frontend Tests
        run: |
          cd Frontend
          npm test -- --coverage --watchAll=false

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: |
            Backend/target/surefire-reports/
            Backend/data-processor-service/target/surefire-reports/
            Frontend/coverage/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    name: Build and Push Docker Images

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest \
            ./Backend

      - name: Build and push Data Processor image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_PROCESSOR:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_PROCESSOR:latest \
            ./Backend/data-processor-service

      - name: Build and push Frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest \
            ./Frontend

      - name: Build and push Scraper image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_SCRAPER:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_SCRAPER:latest \
            ./DataScraping

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    name: Deploy to AWS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Create deployment script
          cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -e

          # Update environment variables
          export ECR_REGISTRY=$1
          export IMAGE_TAG=$2

          # Pull latest images
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY_PROCESSOR:$IMAGE_TAG
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG

          # Update docker-compose with new images
          sed -i "s|image: .*backend.*|image: $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG|g" docker-compose.prod.yml
          sed -i "s|image: .*processor.*|image: $ECR_REGISTRY/$ECR_REPOSITORY_PROCESSOR:$IMAGE_TAG|g" docker-compose.prod.yml
          sed -i "s|image: .*frontend.*|image: $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG|g" docker-compose.prod.yml

          # Deploy with zero downtime
          docker-compose -f docker-compose.prod.yml up -d --remove-orphans

          # Clean up old images
          docker image prune -f
          EOF

          chmod +x deploy.sh

          # Copy deployment files to EC2 and execute
          scp -i ${{ secrets.EC2_SSH_KEY }} -o StrictHostKeyChecking=no \
            deploy.sh docker-compose.prod.yml \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/

          ssh -i ${{ secrets.EC2_SSH_KEY }} -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "./deploy.sh $ECR_REGISTRY $IMAGE_TAG"

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
